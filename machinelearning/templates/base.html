<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MVP Olist - IFAM{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { min-height: 100vh; display: flex; background-color: #f8f9fa; }
        
        /* Estilos Globais da Sidebar */
        .sidebar { width: 280px; background-color: #343a40; color: #fff; flex-shrink: 0; padding: 20px; display: flex; flex-direction: column; }
        .sidebar .nav-link { color: #adb5bd; margin-bottom: 10px; border-radius: 5px; transition: 0.2s; text-decoration: none; padding: 10px 15px; display: block;}
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: #495057; }
        
        /* Área de conteúdo empurra o resto da tela */
        .content { flex-grow: 1; padding: 0; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* CSS Específico que pode ser injetado por cada página */
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <nav class="sidebar shadow-sm">
        <h4 class="text-center mb-4 text-warning"><i class="fa-solid fa-box-open"></i> Olist MVP</h4>
        <hr>
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a href="{% url 'vitrine' %}" class="nav-link {% block nav_vitrine %}{% endblock %}">
                    <i class="fa-solid fa-store"></i> 1. Vitrine Olist
                </a>
            </li>
            <li class="nav-item">
                <a href="{% url 'checkout' %}" class="nav-link {% block nav_checkout %}{% endblock %}">
                    <i class="fa-solid fa-cart-shopping"></i> 2. Checkout Simulador
                </a>
            </li>
            <li class="nav-item mt-4">
                <small class="text-white text-uppercase fw-bold px-3">Validação IA</small>
            </li>
            <li class="nav-item mt-2">
                <a href="{% url 'dashboard' %}" class="nav-link {% block nav_dashboard %}{% endblock %}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard & Stress Test
                </a>
            </li>
        </ul>
        <hr>
        <small class="text-center text-white">Banca IFAM 2026</small>
    </nav>

    <main class="content">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
